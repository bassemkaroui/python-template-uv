name: 'Setup UV, mise & Python'
description: 'Checks out the repo, sets up `uv`, `mise`, and installs the right Python version (supports file or literal).'
inputs:
  python-version:
    description: 'Literal Python version (e.g. "3.12")'
    required: false
  python-version-file:
    description: 'Path to a .python-version file'
    required: false

runs:
  using: composite
  steps:
    - name: Setup uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        enable-cache: true

    - name: Setup mise
      uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      with:
        install_only: true

    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        # one of these two
        python-version: ${{ inputs.python-version }}
        python-version-file: ${{ inputs.python-version-file }}
