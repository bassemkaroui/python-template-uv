name: 'Setup UV, mise & Python'
description: 'Checks out the repo, sets up `uv`, `mise`, and installs the right Python version (supports file or literal).'
inputs:
  python-version:
    description: 'Literal Python version (e.g. "3.12")'
    required: false
  python-version-file:
    description: 'Path to a .python-version file'
    required: false

runs:
  using: composite
  steps:
    - name: Setup uv
      uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      with:
        enable-cache: true

    - name: Setup mise
      uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      with:
        install_only: true

    - name: Setup Python
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
      with:
        # one of these two
        python-version: ${{ inputs.python-version }}
        python-version-file: ${{ inputs.python-version-file }}
