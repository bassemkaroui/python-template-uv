name: 'Setup UV, mise & Python'
description: 'Checks out the repo, sets up `uv`, `mise`, and installs the right Python version (supports file or literal).'
inputs:
  python-version:
    description: 'Literal Python version (e.g. "3.12")'
    required: false
  python-version-file:
    description: 'Path to a .python-version file'
    required: false

runs:
  using: composite
  steps:
    - name: Setup uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        enable-cache: true

    - name: Setup mise
      uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
      with:
        install_only: true

    - name: Setup Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        # one of these two
        python-version: ${{ inputs.python-version }}
        python-version-file: ${{ inputs.python-version-file }}
