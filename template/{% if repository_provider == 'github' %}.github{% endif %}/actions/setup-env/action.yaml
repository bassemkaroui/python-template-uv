name: 'Setup UV, mise & Python'
description: 'Checks out the repo, sets up `uv`, `mise`, and installs the right Python version (supports file or literal).'
inputs:
  python-version:
    description: 'Literal Python version (e.g. "3.12")'
    required: false
  python-version-file:
    description: 'Path to a .python-version file'
    required: false

runs:
  using: composite
  steps:
    - name: Setup uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      with:
        enable-cache: true

    - name: Setup mise
      uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4
      with:
        install_only: true

    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        # one of these two
        python-version: ${{ inputs.python-version }}
        python-version-file: ${{ inputs.python-version-file }}
